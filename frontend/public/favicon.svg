<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background rounded square -->
  <rect width="32" height="32" rx="6" fill="#1e3a5f"/>
  <!-- Ascending bar chart: 3 bars -->
  <rect x="4" y="20" width="6" height="8" rx="1" fill="#3b82f6"/>
  <rect x="13" y="13" width="6" height="15" rx="1" fill="#3b82f6"/>
  <rect x="22" y="6" width="6" height="22" rx="1" fill="#60a5fa"/>
  <!-- Upward trend line -->
  <polyline points="7,19 16,12 25,5" fill="none" stroke="#93c5fd" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
